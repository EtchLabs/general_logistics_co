{% extends "base.html" %}

{% block title %}Error — General Logistics Co{% endblock %}

{% block content %}
<div style="max-width:32rem; margin:4rem auto; text-align:center;">
  <div class="glc-section" style="padding:2.5rem;">
    <p style="font-size:1rem; color:var(--gray-700); margin:0 0 1.5rem;">{{ message }}</p>
    <a href="/"
       style="font-size:0.88rem; color:var(--blue); text-decoration:none; transition:opacity 0.15s;"
       onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">Return to shop</a>
  </div>
</div>
{% endblock %}
