    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  tax_service:
    build:
      context: ./tax_service
      dockerfile: Dockerfile
    container_name: glc_tax_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_SCHEMA: tax
      SERVICE_NAME: tax_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${TAX_SERVICE_PORT:-8008}:8008"
    depends_on:
      postgres:
        condition: service_healthy
