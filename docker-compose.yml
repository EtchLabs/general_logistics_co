name: glc

services:
  postgres:
    image: postgres:16
    container_name: glc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glc_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-glc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - glc_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glc} -d ${POSTGRES_DB:-glc}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    # MongoDB 5+ requires AVX; use 4.4 on hosts without AVX (e.g. some VMs)
    image: mongo:4.4
    container_name: glc_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-glc}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-glc_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-glc}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./data/mongo:/data/db
    networks:
      - glc_network
    healthcheck:
      test:
        [
          "CMD",
          "mongo",
          "--quiet",
          "-u",
          "${MONGO_USER:-glc}",
          "-p",
          "${MONGO_PASSWORD:-glc_dev_password}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: glc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api_gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: glc_api_gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      REDIS_HOST: redis
      SERVICE_NAME: api_gateway
      SERVICE_VERSION: "0.1.0"
      CUSTOMER_SERVICE_URL: http://customer_service:8001
      PRODUCT_SERVICE_URL: http://product_service:8002
      ORDER_SERVICE_URL: http://order_service:8003
      INVENTORY_SERVICE_URL: http://inventory_service:8004
      FULFILLMENT_SERVICE_URL: http://fulfillment_service:8005
      SHIPPING_SERVICE_URL: http://shipping_service:8006
      PAYMENT_SERVICE_URL: http://payment_service:8007
      TAX_SERVICE_URL: http://tax_service:8008
      SUPPLIER_SERVICE_URL: http://supplier_service:8009
      ACCOUNTING_SERVICE_URL: http://accounting_service:8010
      HR_PAYROLL_SERVICE_URL: http://hr_payroll_service:8011
      NOTIFICATION_SERVICE_URL: http://notification_service:8012
      REPORTING_SERVICE_URL: http://reporting_service:8013
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  customer_service:
    build:
      context: ./customer_service
      dockerfile: Dockerfile
    container_name: glc_customer_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      REDIS_HOST: redis
      POSTGRES_SCHEMA: customers
      SERVICE_NAME: customer_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${CUSTOMER_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  product_service:
    build:
      context: ./product_service
      dockerfile: Dockerfile
    container_name: glc_product_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MONGO_HOST: mongo
      REDIS_HOST: redis
      POSTGRES_SCHEMA: products_pricing
      SERVICE_NAME: product_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${PRODUCT_SERVICE_PORT:-8002}:8002"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  order_service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
    container_name: glc_order_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_SCHEMA: orders
      SERVICE_NAME: order_service
      SERVICE_VERSION: "0.1.0"
      CUSTOMER_SERVICE_URL: http://customer_service:8001
      PRODUCT_SERVICE_URL: http://product_service:8002
    ports:
      - "${ORDER_SERVICE_PORT:-8003}:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      customer_service:
        condition: service_healthy
      product_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  inventory_service:
    build:
      context: ./inventory_service
      dockerfile: Dockerfile
    container_name: glc_inventory_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_SCHEMA: inventory
      SERVICE_NAME: inventory_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${INVENTORY_SERVICE_PORT:-8004}:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
