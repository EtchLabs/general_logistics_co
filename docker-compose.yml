      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  supplier_service:
    build:
      context: ./supplier_service
      dockerfile: Dockerfile
    container_name: glc_supplier_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
