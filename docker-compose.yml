    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  payment_service:
    build:
      context: ./payment_service
      dockerfile: Dockerfile
    container_name: glc_payment_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
