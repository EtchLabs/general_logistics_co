      POSTGRES_SCHEMA: fulfillment
      SHIPPING_SERVICE_URL: http://shipping_service:8006
      SERVICE_NAME: fulfillment_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${FULFILLMENT_SERVICE_PORT:-8005}:8005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      shipping_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  shipping_service:
    build:
      context: ./shipping_service
      dockerfile: Dockerfile
    container_name: glc_shipping_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      POSTGRES_SCHEMA: shipping
      SERVICE_NAME: shipping_service
      SERVICE_VERSION: "0.1.0"
    ports:
