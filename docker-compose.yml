    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  hr_payroll_service:
    build:
      context: ./hr_payroll_service
      dockerfile: Dockerfile
    container_name: glc_hr_payroll_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_SCHEMA: hr_payroll
      ACCOUNTING_SERVICE_URL: http://accounting_service:8010
      SERVICE_NAME: hr_payroll_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${HR_PAYROLL_SERVICE_PORT:-8011}:8011"
    depends_on:
      postgres:
        condition: service_healthy
      accounting_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  notification_service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    container_name: glc_notification_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_HOST: mongo
      REDIS_HOST: redis
      SERVICE_NAME: notification_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8012}:8012"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  reporting_service:
    build:
      context: ./reporting_service
      dockerfile: Dockerfile
    container_name: glc_reporting_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_HOST: mongo
      REDIS_HOST: redis
      ORDER_SERVICE_URL: http://order_service:8003
      PRODUCT_SERVICE_URL: http://product_service:8002
      SERVICE_NAME: reporting_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${REPORTING_SERVICE_PORT:-8013}:8013"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      order_service:
        condition: service_healthy
      product_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    container_name: glc_website
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_GATEWAY_URL: http://api_gateway:8080
      REDIS_URL: redis://redis:6379/0
      SERVICE_NAME: website
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${WEBSITE_PORT:-8000}:8000"
    depends_on:
      api_gateway:
        condition: service_healthy
      customer_service:
        condition: service_healthy
      product_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  customer_simulator:
    build:
      context: ./customer_simulator
      dockerfile: Dockerfile
    container_name: glc_customer_simulator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_GATEWAY_URL: http://api_gateway:8080
      SIMULATOR_ORDER_INTERVAL_MIN_SECONDS: ${SIMULATOR_ORDER_INTERVAL_MIN_SECONDS:-5}
      SIMULATOR_ORDER_INTERVAL_MAX_SECONDS: ${SIMULATOR_ORDER_INTERVAL_MAX_SECONDS:-10}
      SIMULATOR_NEW_CUSTOMER_PCT: ${SIMULATOR_NEW_CUSTOMER_PCT:-12}
      SIMULATOR_HEALTH_PORT: 8020
    ports:
      - "${CUSTOMER_SIMULATOR_HEALTH_PORT:-8020}:8020"
    depends_on:
      api_gateway:
        condition: service_healthy
      order_service:
        condition: service_healthy
      product_service:
        condition: service_healthy
      customer_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  public_demo_service:
    build:
      context: ./public_demo_service
      dockerfile: Dockerfile
    container_name: glc_public_demo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_GATEWAY_URL: http://api_gateway:8080
      REDIS_URL: redis://redis:6379/0
      SERVICE_NAME: public_demo_service
      SERVICE_VERSION: "0.1.0"
    ports:
      - "${PUBLIC_DEMO_PORT:-8021}:8021"
    depends_on:
      api_gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
      order_service:
        condition: service_healthy
    networks:
      - glc_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8021/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  supplier_simulator:
    build:
      context: ./supplier_simulator
      dockerfile: Dockerfile
    container_name: glc_supplier_simulator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_GATEWAY_URL: http://api_gateway:8080
      SUPPLIER_POLL_INTERVAL_SECONDS: ${SUPPLIER_POLL_INTERVAL_SECONDS:-30}
    depends_on:
      api_gateway:
        condition: service_healthy
      supplier_service:
        condition: service_healthy
    networks:
      - glc_network

networks:
  glc_network:
    name: glc_network
    driver: bridge
